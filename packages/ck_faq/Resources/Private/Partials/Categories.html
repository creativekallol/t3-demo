<h5><f:translate key="sidebar.label.categories" /></h5>
<ul class="list-unstyled">
    <f:for each="{categories}" as="category">
        <li>
            <f:link.action action="list" class="text-decoration-none {f:if(condition: '{category.uid} == {demand.category}', then: 'active')}" arguments="{category: category.uid, term: demand.term}">
                {category.title}
            </f:link.action>
        </li>
    </f:for>
    <li>
        <f:link.page class="text-decoration-none {f:if(condition: '!{demand.category}', then: 'active')}">
            <f:translate key="sidebar.label.showAll" />
        </f:link.page>
    </li>
</ul>
